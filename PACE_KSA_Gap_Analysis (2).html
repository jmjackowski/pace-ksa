  td.gap { background: #fff8e1; }

  .item { display: block; padding: 2px 0; }

function pad(code) {
  return code.trim().padStart(6, '0');
}

function lookupJob(id) {
  const input = document.getElementById(id);
  const titleEl = document.getElementById(id + '-title');
  const code = pad(input.value);
  if (input.value.trim().length === 0) {
    titleEl.textContent = '';
    titleEl.className = 'job-title';
    input.className = '';
    return;
  }
  const job = KSA_DATA[code];
  if (job) {
    titleEl.textContent = job.title;
    titleEl.className = 'job-title found';
    input.className = '';
  } else {
    titleEl.textContent = 'Job code not found';
    titleEl.className = 'job-title notfound';
    input.className = 'error';
  }
}

function renderItems(items) {
  if (!items || items.length === 0) return '<span style="color:#999; font-style:italic;">None Listed</span>';
  return items.map(i => `<span class="item">${i}</span>`).join('');
}

function computeGap(curItems, tgtItems) {
  const curLower = (curItems || []).map(s => s.toLowerCase().trim());
  return (tgtItems || []).filter(i => !curLower.includes(i.toLowerCase().trim()));
}

function compute() {
  const curCode = pad(document.getElementById('cur').value);
  const tgtCode = pad(document.getElementById('tgt').value);
  const resultsEl = document.getElementById('results');
  const cur = KSA_DATA[curCode];
  const tgt = KSA_DATA[tgtCode];
  if (!cur || !tgt) {
    resultsEl.innerHTML = '<div class="placeholder">One or both job codes not found. Please check and try again.</div>';
    return;
  }
  const dims = [
    { label: 'Knowledge', key: 'K' },
    { label: 'Skills',    key: 'S' },
    { label: 'Abilities', key: 'A' },
  ];
  let html = '';
  dims.forEach(dim => {
    const gap = computeGap(cur[dim.key], tgt[dim.key]);
    const gapClass = gap.length === 0 ? 'gap empty' : 'gap';
    const gapContent = gap.length === 0
      ? 'No gaps — current job covers all target requirements.'
      : gap.map(i => `<span class="item">${i}</span>`).join('');
    html += `
    <div class="section">
      <div class="section-header">${dim.label}${gap.length > 0 ? ' <span class="badge">'+gap.length+' gap'+(gap.length>1?'s':'')+'</span>' : ''}</div>
      <table>
        <tr><th>Current Job</th><th>Target Job</th><th>Gap (Focus Areas)</th></tr>
        <tr>
          <td>${renderItems(cur[dim.key])}</td>
          <td>${renderItems(tgt[dim.key])}</td>
          <td class="${gapClass}">${gapContent}</td>
        </tr>
      </table>
    </div>`;
  });
  resultsEl.innerHTML = html;
}

// Auto-populate from URL params on load
window.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  const cur = params.get('cur');
  const tgt = params.get('tgt');
  if (cur || tgt) {
    const note = document.getElementById('auto-note');
    note.style.display = 'block';
    note.textContent = 'Job codes have been pre-filled from your REDCap responses.';
  }
  if (cur) {
    document.getElementById('cur').value = cur;
    lookupJob('cur');
  }
  if (tgt) {
    document.getElementById('tgt').value = tgt;
    lookupJob('tgt');
  }
  if (cur && tgt) {
    compute();
  }
});
</script>
